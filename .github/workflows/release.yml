name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            arch: aarch64
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            arch: x64
          - platform: windows-latest
            args: ''
            arch: x64-windows

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'RedmineQuick ${{ github.ref_name }}'
          releaseBody: ''
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      # Windows: tauri-action 產生 nsis.zip 但不上傳到 release，在這裡收集
      - name: Collect updater bundle (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path updater-output
          $nsisDir = "src-tauri\target\release\bundle\nsis"
          Write-Host "=== nsis directory contents ==="
          Get-ChildItem -Path $nsisDir | ForEach-Object { Write-Host "  $($_.Name) ($($_.Length) bytes)" }
          $files = Get-ChildItem -Path $nsisDir -File | Where-Object { $_.Name -like "*.nsis.zip*" }
          foreach ($f in $files) {
            Copy-Item $f.FullName -Destination "updater-output\$($f.Name)"
            Write-Host "Collected: $($f.Name)"
          }
          Write-Host "=== Updater output ==="
          Get-ChildItem updater-output

      # macOS: tauri-action 會重新打包 .app.tar.gz，導致原始簽名失效
      # 重新簽名後，收集 .app.tar.gz + .sig（確保兩者匹配）
      - name: Re-sign and collect updater bundle (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          mkdir -p updater-output
          ARCH="${{ matrix.arch }}"
          BUNDLE=$(find src-tauri/target -name "*.app.tar.gz" -type f | head -1)
          echo "Found bundle: $BUNDLE"
          echo "Re-signing..."
          npx tauri signer sign "$BUNDLE"
          cp "$BUNDLE" "updater-output/redminequick_${ARCH}.app.tar.gz"
          cp "${BUNDLE}.sig" "updater-output/redminequick_${ARCH}.app.tar.gz.sig"
          echo "=== Updater output ==="
          ls -la updater-output/

      - name: Upload updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: updater-${{ matrix.arch }}
          path: updater-output/
          if-no-files-found: ignore

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download updater artifacts
        uses: actions/download-artifact@v4
        with:
          path: updater-artifacts
          merge-multiple: true

      - name: List updater artifacts
        run: find updater-artifacts -type f | sort

      - name: Download release assets from draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          TAG="${{ github.ref_name }}"
          gh release download "$TAG" --dir release-assets || true
          ls -la release-assets/

      # 用 re-sign / pre-build 收集的 updater bundle 取代或補充 draft release 的版本
      - name: Replace updater bundles with collected versions
        run: |
          echo "=== Before replacement ==="
          ls -la release-assets/ 2>/dev/null || true

          # macOS: 用 re-sign 後的 .app.tar.gz 取代 draft release 的
          for arch in aarch64 x64; do
            BUNDLE="updater-artifacts/redminequick_${arch}.app.tar.gz"
            if [ -f "$BUNDLE" ]; then
              cp "$BUNDLE" "release-assets/redminequick_${arch}.app.tar.gz"
              echo "Replaced macOS $arch bundle with re-signed version"
            fi
          done

          # Windows: 加入 nsis.zip（draft release 沒有這個檔案）
          for f in updater-artifacts/*.nsis.zip; do
            if [ -f "$f" ]; then
              cp "$f" release-assets/
              echo "Added: $(basename "$f")"
            fi
          done

          echo "=== After replacement ==="
          ls -la release-assets/

      - name: Generate latest.json
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="HoHow/RedmineQuick-releases"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE_URL="https://github.com/$REPO/releases/download/$TAG"

          # 讀取簽名
          SIG_AARCH64=$(cat updater-artifacts/redminequick_aarch64.app.tar.gz.sig 2>/dev/null || echo "")
          SIG_X64_MAC=$(cat updater-artifacts/redminequick_x64.app.tar.gz.sig 2>/dev/null || echo "")
          SIG_WINDOWS=$(cat updater-artifacts/*.nsis.zip.sig 2>/dev/null || echo "")

          # Windows nsis.zip 檔名
          NSIS_ZIP=$(ls updater-artifacts/*.nsis.zip 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")

          echo "Signatures:"
          echo "  aarch64: $([ -n "$SIG_AARCH64" ] && echo 'found' || echo 'MISSING')"
          echo "  x64 mac: $([ -n "$SIG_X64_MAC" ] && echo 'found' || echo 'MISSING')"
          echo "  windows: $([ -n "$SIG_WINDOWS" ] && echo 'found' || echo 'MISSING')"
          echo "Windows bundle: $NSIS_ZIP"

          printf '{\n  "version": "%s",\n  "pub_date": "%s",\n  "platforms": {\n    "darwin-aarch64": {\n      "signature": "%s",\n      "url": "%s/redminequick_aarch64.app.tar.gz"\n    },\n    "darwin-x86_64": {\n      "signature": "%s",\n      "url": "%s/redminequick_x64.app.tar.gz"\n    },\n    "windows-x86_64": {\n      "signature": "%s",\n      "url": "%s/%s"\n    }\n  }\n}\n' \
            "$VERSION" "$PUB_DATE" \
            "$SIG_AARCH64" "$BASE_URL" \
            "$SIG_X64_MAC" "$BASE_URL" \
            "$SIG_WINDOWS" "$BASE_URL" "$NSIS_ZIP" \
            > release-assets/latest.json

          echo "Generated latest.json:"
          cat release-assets/latest.json

      # 從 CHANGELOG.md 抽取當前版本的更新紀錄
      - name: Extract changelog
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          awk 'BEGIN{p=0} /^## v'"$VERSION"'/{p=1;next} /^## v/{p=0} p' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "RedmineQuick $TAG" > release-notes.md
          fi
          echo "Release notes:"
          cat release-notes.md

      - name: Publish to public releases repo
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPO_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="HoHow/RedmineQuick-releases"
          gh release create "$TAG" \
            --repo "$REPO" \
            --title "RedmineQuick $TAG" \
            --notes-file release-notes.md \
            release-assets/* \
            2>/dev/null || {
              gh release edit "$TAG" \
                --repo "$REPO" \
                --title "RedmineQuick $TAG" \
                --notes-file release-notes.md
              gh release upload "$TAG" \
                --repo "$REPO" \
                --clobber \
                release-assets/*
            }
